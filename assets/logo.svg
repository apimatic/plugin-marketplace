<svg width="800" height="800" viewBox="0 0 2047 2047" fill="none" xmlns="http://www.w3.org/2000/svg">
<title id="title">API Context Plugins</title>
  <desc id="desc">General-purpose AI models are trained on public code and documentation, much of it outdated. They have no awareness of an actual API version, latest SDKs or the recommended workflows. \n\nAPI Context Plugins give coding assistants deterministic, version-aware API context, generated directly from your API definition and SDKs. Instead of scraping public documentation or guessing from memory, the AI is grounded in the exact OpenAPI definition, current SDK versions, executable, idiomatic code samples, and recommended integration workflows.</desc>
  <rect width="2047" height="2047" rx="60" fill="#0C7FF2"/>
