<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Context Plugin Catalog logo</title>
  <desc id="desc">Text logo for the Context Plugin Catalog, a Cursor plugin that discovers and integrates third-party APIs via the APIMatic MCP server.</desc>
  <rect width="128" height="128" rx="20" fill="#0F172A"></rect>
  <text x="50%" y="50%" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#E0F2FE">
    <tspan x="50%" dy="-0.6em">Context</tspan>
    <tspan x="50%" dy="1.4em">Plugin</tspan>
  </text>
</svg>